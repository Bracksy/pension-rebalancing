<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erweitertes Grid-Layout mit 6 Spalten</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-container">

    <!-- Oben Links -->
    <div class="upper-left">
        <h2>Aktueller Kontostand: CURRENT_BALANCE CHF</h2>
        <div class="form-grid">
            <!-- Zeile 1 -->
            <label for="ul-k1">Konto 1</label>
            <div class="empty-cell"></div>
            <div class="empty-cell"></div>
            <input type="text" id="ul-k1" value="CURRENT_ACCOUNT_1" disabled>
            <span class="currency-label">CHF</span>

            <!-- Zeile 2 -->
            <label for="ul-k2">Konto 2</label>
            <div class="empty-cell"></div>
            <div class="empty-cell"></div>
            <input type="text" id="ul-k2" value="CURRENT_ACCOUNT_2" disabled>
            <span class="currency-label">CHF</span>

            <!-- Zeile 3 -->
            <label for="ul-k3a">Konto 3a</label>
            <input type="text" id="ul-k3a-sub1" value="CURRENT_AMOUNT_3A" disabled>
            <input type="text" id="ul-k3a-sub2" value="CURRENT_PRICE_3A" disabled>
            <input type="text" id="ul-k3a-main" value="CURRENT_ACCOUNT_3A" disabled>
            <span class="currency-label">CHF</span>

            <!-- Zeile 4 -->
            <label for="ul-k3b">Konto 3b</label>
            <input type="text" id="ul-k3b-sub1" value="CURRENT_AMOUNT_3B" disabled>
            <input type="text" id="ul-k3b-sub2" value="CURRENT_PRICE_3B" disabled>
            <input type="text" id="ul-k3b-main" value="CURRENT_ACCOUNT_3B" disabled>
            <span class="currency-label">CHF</span>
        </div>
    </div>

    <!-- Oben Mitte (Pfeil bleibt fix auf Zeile 1 ausgerichtet) -->
    <div class="upper-center">
        <div class="arrow-right" title="Rebalancing"></div>
    </div>

    <!-- Oben Rechts -->
    <div class="upper-right">
        <h2>Neuer Kontostand: NEW_BALANCE CHF</h2>
        <div class="form-grid">
            <!-- Zeile 1 -->
            <label for="ur-k1">Konto 1</label>
            <div class="empty-cell"></div>
            <div class="empty-cell"></div>
            <input type="text" id="ur-k1" value="NEW_ACCOUNT_1" disabled>
            <span class="currency-label">CHF</span>

            <!-- Zeile 2 -->
            <label for="ur-k2">Konto 2</label>
            <div class="empty-cell"></div>
            <div class="empty-cell"></div>
            <input type="text" id="ur-k2" value="NEW_ACCOUNT_2" disabled>
            <span class="currency-label">CHF</span>

            <!-- Zeile 3 -->
            <label for="ur-k3a">Konto 3a</label>
            <input type="text" id="ur-k3a-sub1" value="NEW_AMOUNT_3A" disabled>
            <input type="text" id="ur-k3a-sub2" value="NEW_PRICE_3A" disabled>
            <input type="text" id="ur-k3a-main" value="NEW_ACCOUNT_3A" disabled>
            <span class="currency-label">CHF</span>

            <!-- Zeile 4 -->
            <label for="ur-k3b">Konto 3b</label>
            <input type="text" id="ur-k3b-sub1" value="NEW_AMOUNT_3B" disabled>
            <input type="text" id="ur-k3b-sub2" value="NEW_PRICE_3B" disabled>
            <input type="text" id="ur-k3b-main" value="NEW_ACCOUNT_3B" disabled>
            <span class="currency-label">CHF</span>
        </div>
    </div>

    <!-- Unterer Bereich -->
    <div class="lower">
        <h3>Rebalancing</h3>
        REBALANCING_OUTPUT
    </div>
</div>

</body>
</html>
